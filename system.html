            $conn = mysqli_connect('localhost', 'root', '', 'helpdesk');

            $sql = "SELECT s.specialist_name, s.job_title, s.problem_type,
                COUNT(t.specialist_name) AS ticket_count
                FROM specialist s
                LEFT JOIN ticket t ON t.specialist_name = s.specialist_name
                GROUP BY s.specialist_name, s.job_title, s.problem_type";

            $result = mysqli_query($conn, $sql);
           
        ?>

        <h1>Ongoing Ticket Support Tracking</h1>  

        <table>
                <tr>
                    <th>Specialist</th>
                    <th>Job Title</th>
                    <th>Ongoing Tickets</th>
                    <th>Workload</th>
                </tr>

                <?php while($row = mysqli_fetch_assoc($result)){ 
                    
                    $count = $row['ticket_count'];

                    if($count <=2){
                        $workload = "Low";
                    } elseif($count <=5){
                        $workload = "Medium";
                    } else {
                        $workload = "High";
                    }
                
                    ?>

                <tr>
                    <td><?php echo $row['specialist_name']; ?></td>
                    <td><?php echo $row['job_title'];?></td>
                    <td><?php echo $count; ?></td>

                </tr>
