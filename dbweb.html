<div class = "login">

</div>

    <div class="container">

        <form name ="login" action = "login.php" onsubmit = "return ValidateForm()" method ="post"> 
            
            <div>
                <label for="unam">Username: </label>
                <input type= "text" id= "uname" name = "name" size="60" required/>
            </div>
    
            <div>
                <label for="pass">Password: </label>
                <input type="password" id="pass" pass = "pass" size = 61required/>

            </div>

        
        </form>

<script>
    function validateForm(){
        let x = document.forms["login"]["name"].value;
        if (x == "") {
            alert ("Username or Password Is Incorrect");
            return false;
        }
    }
</script>
