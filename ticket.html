<!DOCTYPE html> 
<html>
<head> 
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mozambique Limited Helpdesk</title>
    <link rel="stylesheet" href="style.css">
</head>

<body> 

    <div class="bordertop"></div>
        <h2>Submit a Ticket</h2>
            
        <div class = "logout"> 
           <a href="dbweb.html" class="logout-btn">Log out</a>
        </div>

         <div class="navbar">
            <ul> 
                <li><a href = "ticket.html">Submit A Ticket</a></li>
                <li><a href = "request.php">Ticket Request</a></li>
                <li><a href = "users.php">User Management</a></li>
                <li><a href = "system.php">System</a></li>
            </ul>

    <div class ="container2">
        <div class ="decobox">
            <div class="info">

                        <form id ="ticket" action="save_ticket.php" method="post">

                            <div>
                                <label for="emNAME">Name:</label>
                                <input type="text" id="emNAME" name = "employeeName" size="40"/>
                            </div>

                            <div>
                                <label for="CallerID">Caller ID:</label>
                                <input type="text" id="CallerID" name = "employee_id" size="40"/>
                            </div>
                    
                            <label for = "dropbtn">Problem Type:</label>
                            <select id = "dropbtn" name="problemType"> 
                                <option value ="Password Reset"selected>Password Reset</option>
                                <option value ="Printer Issues">Printer Issues</option>
                                <option value ="Wi-Fi Connectivity">Wi-Fi Connectivity</option>
                                <option value ="Blue Screen Error">Blue Screen Error</option>
                                <option value ="Hard Drive Failure">Hard Drive Failure</option>
                                <option value ="Software Installation Failure">Software Installation Failure</option>
                            </select>   
                        
                            <div>
                                <label for="notes">Notes: </label>
                                <textarea type="text" id="notes" name= "notes" rows = "6" cols = "70"></textarea>
                            </div>

                            <div>
                                <label for="emAsign">Specialist:</label>
                                <select id = "dropbtn" name= "Specialist"> 

                                <option value ="Stephanie Burgers" selected>Stephanie Burgers</option>
                                <option value ="Steve Warrant">Steve Warrant</option>
                                <option value ="Holly Phelps">Holly Phelps</option>
                                <option value ="Ella Kenyon">Ella Kenyon</option>
                                <option value ="Kip Nevil">Kip Nevil</option>
                                <option value ="Susanna Anabelle">Susanna Anabelle</option>
                                <option value ="Chloe Booton">Chloe Booton</option>
                                </select>  
                            </div>
                            
                            <input type= "submit" name= "submit" value = "Submit">
                        
                        </form>           
                    </div>
                </div>
            </div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
    function getSelectedOption (){
        const dropdown = document.getElementById("dropbtn");
        const value = dropdown.value;
        const text = dropdown.options[dropdown.selectedIndex].text; 
        console.log("Selected Value:", value);
        console.log("Selected Text:", text); 
        return {value, text};
    }

</script>


<script>
    $("#ticket").submit(function(event){

        event.preventDefault(); 

        $.post("save_ticket.php", {
            employeeName:  $("#emNAME").val(),
            employee_id:   $("#CallerID").val(),
            problemType:   $("#dropbtn").val(),
            notes:         $("#notes").val(),
            Specialist:    $("select[name='Specialist']").val()
        },
        function(response){
            if(response === "success"){
                alert("Ticket submitted successfully!");
                $("#ticket")[0].reset(); 
            } else {
                alert("Something went wrong. Please try again.");
            }
        });
    });
</script>

</body>
</html>
